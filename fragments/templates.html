<template id="tpl-menu-bar">
    <div class="menu-bar">
        <div class="menu-left">
            <button class="btn" data-action="back" data-slot="backLabel">Главная</button>
        </div>
    </div>
</template>

<!-- Боевой юнит -->
<template id="tpl-battle-unit">
    <div class="unit" data-role="unit-root">
        <span data-slot="icon"></span>
        <div class="hp-bar"></div>
    </div>
</template>

<!-- Индикатор угрозы -->
<template id="tpl-threat-indicator">
    <div class="threat-indicator-container">
        <span class="threat-label">Угроза:</span>
        <div class="threat-bar-wrapper">
            <div class="threat-bar-bg"></div>
            <div class="threat-bar-zone zone-safe" data-role="zone0"></div>
            <div class="threat-bar-zone zone-warn" data-role="zone1"></div>
            <div class="threat-bar-zone zone-danger" data-role="zone2"></div>
            <div class="threat-fill-bar" data-role="fillBar"></div>
            <div class="threat-ticks" data-role="ticks"></div>
            <div class="threat-threshold threshold-1" data-role="threshold1"></div>
            <div class="threat-threshold threshold-2" data-role="threshold2"></div>
            <div class="threat-indicator-marker" data-role="marker"></div>
        </div>
        <span class="threat-icon" data-slot="icon">🛡️</span>
    </div>
</template>

<!-- Модалка: Детали угрозы -->
<template id="tpl-threat-details-modal">
    <div class="threat-details-body">
        <div class="threat-title-section">
            <div class="threat-big-icon" data-slot="bigIcon">🛡️</div>
            <div class="threat-title-text" data-slot="levelName"></div>
        </div>
        <div class="threat-separator"></div>
        <div class="threat-info-section">
            <div class="threat-row-box">
                <span class="threat-label-text">Дней в секторе:</span>
                <span class="threat-value-text" data-slot="days">0</span>
            </div>
            <div class="threat-row-box threat-col">
                <div class="threat-subtitle">Пороги угрозы:</div>
                <div class="threat-threshold-list" data-role="thresholdList"></div>
            </div>
            <div class="threat-multiplier-box">
                <div class="threat-subtitle">⚔️ Влияние на босса сектора:</div>
                <div class="threat-desc" data-role="multiplierDesc"></div>
            </div>
        </div>
    </div>
</template>

<!-- Модалка: Превью ноды -->
<template id="tpl-node-preview-modal">
    <div class="node-preview-body">
        <div class="node-travel-info" data-role="travelInfo" style="display:none;">
            <div class="node-travel-text" data-slot="travelText"></div>
        </div>
        <div class="node-travel-sep" data-role="travelSep" style="display:none;"></div>
        
        <div class="node-empty-text" data-role="emptyText" style="display:none;">Эта нода не содержит событий.</div>
        
        <div class="node-content-list" data-role="contentList"></div>
    </div>
</template>

<template id="tpl-node-content-card">
    <div class="achievement-card node-content-card">
        <div class="achievement-icon" data-slot="icon"></div>
        <div class="achievement-name" data-slot="name"></div>
    </div>
</template>

<!-- Герой: шкалы развития -->
<template id="tpl-dev-tracks-screen">
    <div class="hero-dev-root">
        <div id="dev-tracks-header" class="hero-dev-header"></div>
        <div id="dev-tracks-list" class="hero-dev-list"></div>
    </div>
    
</template>

<template id="tpl-dev-track-row">
    <div class="dev-track-row">
        <div class="dev-track-left">
            <div class="dev-track-icon" data-role="icon">📊</div>
            <div class="dev-track-name" data-role="name">Трек</div>
        </div>
        <div class="dev-track-center" data-role="progress"></div>
        <div class="dev-track-right">
            <button class="btn" data-role="invest1">+1</button>
        </div>
    </div>
</template>

<template id="tpl-dev-track-item">
    <div class="dev-track-item" data-role="cell"></div>
</template>

<template id="tpl-hero-class-item">
    <div class="hero-class-item" data-id="">
        <div class="hero-class-icon" data-role="icon">❓</div>
        <div class="hero-class-name" data-role="name">Класс</div>
    </div>
</template>

<template id="tpl-unit-table-head">
    <thead>
        <tr>
            <th class="icon-cell">👤</th>
            <th>Имя</th>
            <th>ID</th>
            <th data-slot="extraCol1">Тип</th>
            <th data-slot="extraCol2">❤️ HP</th>
            <th data-slot="extraCol3">💥 Урон</th>
            <th data-slot="extraCol4">🎯 Цели</th>
        </tr>
    </thead>
</template>

<template id="tpl-encounter-item">
    <div class="encounter-item" data-id="" title="">
        <div class="encounter-icon">❗</div>
        <div class="encounter-name"></div>
    </div>
    <!-- Описание и состав выводятся в модалке -->
    <!-- Состояния задаются классами: .locked / .done / .available -->
</template>

<template id="tpl-button-row">
    <div style="display:flex; gap:12px; justify-content:center;"></div>
</template>

<template id="tpl-file-input">
    <div class="action-group">
        <label class="file-label" data-slot="labelText">Загрузить файл</label>
        <label class="custom-file-btn" data-action="open" data-slot="buttonText">📁 ВЫБРАТЬ ФАЙЛ</label>
        <input type="file" class="file-input" />
    </div>
</template>

<template id="tpl-config-panel">
    <div class="config-section">
        <div class="config-info">
            <h3 class="section-title" data-slot="title">⚙️ Конфигурация</h3>
            <div class="file-status" data-role="status"></div>
        </div>
        <div class="config-actions" data-role="actions">
            <div data-role="file-slot"></div>
            <div class="action-group" data-role="sample-slot">
                <button class="btn secondary-btn btn-w-200" data-action="sample">📥 ОБРАЗЕЦ</button>
            </div>
        </div>
        <!-- Кнопка действия вынесена на уровень экрана -->
    </div>
</template>

<!-- Модальные окна -->
<template id="tpl-modal-info">
    <div class="modal-window">
        <div class="modal-title" data-slot="title"></div>
        <div class="modal-body" data-role="body"></div>
        <div class="modal-actions" data-role="actions" style="display:none;"></div>
    </div>
</template>

<template id="tpl-modal-confirm">
    <div class="modal-window">
        <div class="modal-title" data-slot="title"></div>
        <div class="modal-body" data-role="body"></div>
        <div class="modal-actions" data-role="actions" style="display:flex; justify-content:center; gap:12px;">
            <button class="btn" data-action="ok">ОК</button>
        </div>
    </div>
</template>

<template id="tpl-modal-dialog">
    <div class="modal-window">
        <div class="modal-title" data-slot="title"></div>
        <div class="modal-body" data-role="body"></div>
        <div class="modal-actions" data-role="actions" style="display:flex; justify-content:center; gap:12px;">
            <!-- Кнопка принятия слева -->
            <button class="btn" data-action="yes">Да</button>
            <!-- Кнопка отказа справа -->
            <button class="btn secondary-btn" data-action="no">Нет</button>
        </div>
    </div>
</template>

<template id="tpl-rewards-list">
    <div class="rewards-list">
        <div class="rewards-items" data-role="items" style="display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:12px;"></div>
    </div>
    <!-- Элемент списка создаётся динамически -->
</template>

<template id="tpl-reward-currency">
    <div class="reward-item" data-id="">
        <div class="reward-icon">💠</div>
        <div class="reward-name">Награда</div>
    </div>
    <!-- Карточка валюты -->
    <!-- .reward-item используется общая стилизация -->
    <!-- Внутри: .reward-icon, .reward-name -->
    
</template>

<template id="tpl-reward-unit">
    <div class="reward-item" data-id="">
        <div class="reward-icon">👤</div>
        <div class="reward-name">Союзник</div>
    </div>
    <!-- Карточка юнита-союзника -->
</template>

<template id="tpl-reward-perk">
    <div class="reward-item" data-id="">
        <div class="reward-icon">🥈</div>
        <div class="reward-name">Перк</div>
    </div>
</template>

<template id="tpl-modal-reward-pick">
    <div class="modal-window">
        <div class="modal-title" data-slot="title"></div>
        <div class="modal-body" data-role="body"></div>
        <div class="modal-actions" data-role="actions" style="display:flex; justify-content:center; gap:12px;">
            <button class="btn" data-action="yes" disabled>Выбрать</button>
        </div>
    </div>
    
</template>

<template id="tpl-achievement-item">
    <div class="achievement-card clickable" data-id="">
        <div class="achievement-icon" data-slot="icon">🏆</div>
        <div class="achievement-name" data-slot="name">Достижение</div>
        <div class="achievement-progress" data-slot="progress">0 / 0</div>
        <div class="achievement-status" data-slot="status" style="display:none;">Достигнуто</div>
    </div>
    <!-- Используются классы: .achievement-card(.achieved) с .achievement-icon, .achievement-name, .achievement-progress, .achievement-status -->
</template>

<template id="tpl-perk-item">
    <div class="achievement-card clickable perk-card" data-id="">
        <div class="achievement-icon">🥈</div>
        <div class="achievement-name">Перк</div>
        <div class="achievement-progress" style="display:none;"></div>
        <div class="achievement-status" style="display:none;"></div>
    </div>
</template>

<template id="tpl-perk-modal-body">
    <div class="upgrade-modal-body">
        <div class="upgrade-desc" data-role="desc"></div>
    </div>
    
</template>

<template id="tpl-node-content-item">
    <div class="node-content-item">
        <div class="node-content-icon" data-role="icon"></div>
    </div>
</template>

<!-- Тело модалки описания юнита -->
<template id="tpl-unit-modal-body">
    <table class="unit-info-table unit-modal-table">
        <tr>
            <td class="unit-info-value" data-role="iconName" colspan="2"></td>
            <td class="unit-info-value" data-role="type"></td>
        </tr>
        <tr>
            <td class="unit-info-value" data-role="hp"></td>
            <td class="unit-info-value" data-role="damage"></td>
            <td class="unit-info-value" data-role="targets"></td>
        </tr>
    </table>
</template>

<!-- Герой: развитие -->
<template id="tpl-hero-dev-screen">
    <div class="hero-dev-root">
        <div id="hero-dev-header" class="hero-dev-header"></div>
        <div id="hero-dev-list" class="hero-dev-list"></div>
    </div>
    <!-- Внутреннее наполнение см. tpl-hero-dev-header и tpl-hero-dev-row -->
    
</template>

<template id="tpl-hero-dev-header">
    <div class="hero-dev-header">
        <div class="hero-dev-title" data-role="title"></div>
        <div class="hero-dev-level" data-role="level"></div>
    </div>
</template>

<template id="tpl-hero-dev-row">
    <div class="hero-dev-row">
        <div class="hero-dev-free" data-role="free"></div>
        <div class="hero-dev-sep" aria-hidden="true"></div>
        <div class="hero-dev-paid" data-role="paid"></div>
        <div class="hero-dev-action" data-role="action">
            <div class="hero-dev-level-title" data-role="levelTitle"></div>
            <button class="btn" data-role="buyBtn"></button>
        </div>
    </div>
</template>

<template id="tpl-upgrade-item">
    <div class="reward-item upgrade-item" data-id="">
        <div class="reward-icon" data-role="icon">💠</div>
        <div class="reward-name" data-role="name">Улучшение</div>
        <div class="upgrade-price" data-role="price"></div>
    </div>
</template>

<template id="tpl-upgrade-modal-body">
    <div class="upgrade-modal-body">
        <div class="upgrade-desc" data-role="desc"></div>
        <div class="upgrade-price-line" data-role="priceLine"></div>
    </div>
</template>

<template id="tpl-raid-card">
    <div class="raid-card" data-id="">
        <div class="raid-card-header">
            <div class="raid-icon" data-role="icon">⚔️</div>
            <div class="raid-info">
                <div class="raid-name" data-role="name">Рейд</div>
                <div class="raid-duration" data-role="duration">Длительность: 3 дня</div>
            </div>
            <div class="raid-status-badge" data-role="status"></div>
        </div>
    </div>
</template>

<template id="tpl-raid-army-unit">
    <div class="raid-army-unit clickable" data-id="">
        <div class="raid-unit-icon" data-role="icon">👤</div>
        <div class="raid-unit-name" data-role="name">Юнит</div>
        <div class="raid-unit-count" data-role="count">x1</div>
    </div>
</template>

<!-- Таблица отладки модов -->
<template id="tpl-mods-debug-table">
    <table class="bestiary-table unit-info-table">
        <thead>
            <tr>
                <th>Type</th>
                <th>Path</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody data-role="body"></tbody>
    </table>
</template>

<template id="tpl-mods-debug-row">
    <tr>
        <td data-slot="type"></td>
        <td data-slot="path"></td>
        <td data-slot="value"></td>
    </tr>
</template>

<!-- Таблица пула юнитов -->
<template id="tpl-pool-table">
    <table class="bestiary-table unit-info-table">
        <thead>
            <tr>
                <th class="icon-cell">👤</th>
                <th>Имя</th>
                <th>ID</th>
                <th>Кол-во</th>
            </tr>
        </thead>
        <tbody data-role="body"></tbody>
    </table>
</template>

<template id="tpl-pool-row">
    <tr>
        <td class="icon-cell" data-slot="icon"></td>
        <td data-slot="name"></td>
        <td data-slot="id"></td>
        <td data-slot="count"></td>
    </tr>
</template>

<!-- Элемент таверны (покупка) -->
<template id="tpl-tavern-item">
    <div class="tavern-item-card">
        <div class="tavern-unit-preview" data-role="preview"></div>
        <button class="btn" data-action="buy" data-slot="price">100 💰</button>
    </div>
</template>

<!-- Лог боя -->
<template id="tpl-battle-log-entry">
    <div class="log-entry" data-slot="text"></div>
</template>
